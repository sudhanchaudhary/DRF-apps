<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>

<body>

    <div class="main-wrapper">
        <div class="container py-4">
            <div class="row justify-content-center">

                <div class="col-12 d-flex justify-content-center">

                    <div class="card custom-card">
                        <h1 class="text-center">App A</h1>
                        <div class="card-body">

                            <h3 class="text-center mb-2" style="color: #4e54c8;">Data Entry</h3>
                            <p class="text-center text-muted mb-3">
                                API CRUD Demo Between Two Web Apps
                            </p>
                            {% if messages %}
                            {% for message in messages %}
                            <div class="alert alert-success" role="alert">
                                {{message}}
                            </div>

                            {% endfor %}
                            {% endif %}
                            <form method="POST" action="{% url 'home' %}">
                                {% csrf_token %}

                                {% for field in form %}
                                <div class="mb-2">
                                    <label class="form-label small">{{ field.label }}</label>
                                    {{ field }}
                                    <div class="text-danger small">
                                        {{ field.errors }}
                                    </div>
                                </div>
                                {% endfor %}

                                <button type="submit" class="btn btn-custom w-100 mt-2">
                                    Submit
                                </button>
                            </form>

                        </div>
                        <a href="">
                            <div class="btn btn-custom w-100 mt-2">Click me to visit App B</div>
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
